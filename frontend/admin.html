<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="icon" type="image/png" href="/favicon.png" />
  <link rel="apple-touch-icon" href="/favicon.png" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <title>The Desk — Centre Point Amravati</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Marcellus&family=Cormorant+Garamond:wght@400;600&family=Jost:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/src/admin.css" />
</head>
<body>

<!-- ================= LOGIN ================= -->
<div class="gate" id="gate">
  <form class="gate__card" id="loginForm">
    <span class="gate__mark">CP</span>
    <h1>The Desk</h1>
    <p class="gate__sub">Centre Point Amravati — staff only</p>

    <label>Email<input type="email" id="email" autocomplete="username" required /></label>
    <label>Password<input type="password" id="password" autocomplete="current-password" required /></label>

    <button type="submit" class="btn" id="loginBtn">Sign in</button>
    <p class="gate__err" id="loginErr" hidden></p>
  </form>
</div>

<!-- ================= DESK ================= -->
<div class="desk" id="desk" hidden>

  <header class="top">
    <div class="top__brand">
      <span class="top__mark">CP</span>
      <div>
        <strong>The Desk</strong>
        <em>Amravati</em>
      </div>
    </div>

    <div class="top__right">
      <span class="top__who" id="who"></span>
      <a href="/" class="top__link">View site</a>
      <button class="top__out" id="signout">Sign out</button>
    </div>
  </header>

  <main class="inbox">

    <div class="inbox__head">
      <div>
        <h2>Enquiries</h2>
        <p id="summary">Loading…</p>
      </div>

      <div class="filters" id="filters">
        <button class="filter is-on" data-status="all">All <b id="cAll">0</b></button>
        <button class="filter" data-status="new">New <b id="cNew">0</b></button>
        <button class="filter" data-status="replied">Replied <b id="cReplied">0</b></button>
        <button class="filter" data-status="archived">Archived <b id="cArchived">0</b></button>
      </div>
    </div>

    <div class="list" id="list"></div>

    <p class="empty" id="empty" hidden>Nothing here yet.</p>
  </main>
</div>

<script type="module" src="/src/admin.js"></script>
</body>
</html>
