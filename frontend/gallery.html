<!DOCTYPE html>

<head>

  <title>Gallery | Centre Point Amravati</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />

<body>
  <div class="pagepad"></div>

    </div>

  <section class="chapter">

      <div class="gwall" data-reveal>

        <div class="gwall__i"><img src="/src/assets/images/orchid-ballroom.jpeg" alt="Orchid Ball Room" /></div>
        <div class="gwall__i"><img src="/src/assets/images/deluxe-room.jpeg" alt="Deluxe suite" /></div>
        <div class="gwall__i"><img src="/src/assets/images/suite-lounge-portrait.jpeg" alt="Luxury suite" /></div>
        <div class="gwall__i"><img src="/src/assets/images/hotel-amravati-aerial.jpeg" alt="Aerial view" /></div>

    </div>

  <section class="ctasplit">
    <div class="ctasplit__t" data-reveal="l">
      <span class="eyebrow eyebrow--plain" style="color:var(--plum-lt)">Reservations</span>
      <h2 class="t-lg">See it for yourself.</h2>
      <div class="ctasplit__actions">
        <a href="contact.html" class="btn btn--light">Enquire Now</a>
        <a href="rooms.html" class="btn btn--light">Explore Rooms</a>
      </div>
    </div>
    <div class="ctasplit__img" data-reveal="r"><img src="/src/assets/images/orchid-ballroom.jpeg" alt="" /></div>
